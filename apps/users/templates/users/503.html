<!DOCTYPE html>
<html>
<head>
    <title>Site Under Maintenance</title>
    <style>
        body { text-align: center; padding: 150px; font-family: 'Inter', sans-serif; background: #000; color: #fff; margin: 0; }
        h1 { font-size: 50px; margin-bottom: 20px; color: #a78bfa; }
        p { font-size: 20px; color: #9ca3af; margin-bottom: 30px; }
        .container { max-width: 500px; margin: 0 auto; }
        .waitlist-form { background: rgba(255,255,255,0.1); padding: 30px; border-radius: 20px; margin-top: 40px; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border: 1px solid #374151; background: #1f2937; border-radius: 10px; color: #fff; font-size: 16px; }
        button { background: #7c3aed; color: white; padding: 15px 30px; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; width: 100%; }
        button:hover { background: #6d28d9; }
        .message { margin-top: 15px; padding: 10px; border-radius: 8px; display: none; }
        .success { background: #10b981; color: white; }
        .error { background: #ef4444; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>We'll be back soon!</h1>
        <p>We are currently performing scheduled maintenance to improve our services.</p>
        <p>— DearSelf Team</p>
        
        <div class="waitlist-form">
            <h3 style="margin-bottom: 20px;">Join the waitlist</h3>
            <p style="font-size: 14px; margin-bottom: 20px;">Get notified when we're back and receive early access updates</p>
            <input type="email" id="waitlist_email" placeholder="Enter your email address" required>
            <button onclick="submitWaitlist()">Notify Me</button>
            <div id="message" class="message"></div>
        </div>
    </div>

    <script>
        function submitWaitlist() {
            const email = document.getElementById('waitlist_email').value;
            const messageDiv = document.getElementById('message');
            
            if (!email) {
                showMessage('Please enter your email', 'error');
                return;
            }
            
            fetch('users/waitlist-signup/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify({ email: email })
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    showMessage('Thank you! We\'ll notify you when we\'re back.', 'success');
                    document.getElementById('waitlist_email').value = '';
                } else {
                    showMessage(data.message || 'Something went wrong', 'error');
                }
            })
            .catch(error => {
                showMessage('Network error. Please try again.', 'error');
            });
        }
        
        function showMessage(msg, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = msg;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }
        
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
    </script>
</body>
</html>
