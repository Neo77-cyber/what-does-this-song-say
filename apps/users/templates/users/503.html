<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Under Maintenance</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body { 
            text-align: center; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: #fff; 
            color: #333; 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container { 
            max-width: 500px; 
            width: 100%;
            margin: 0 auto; 
            padding: 20px;
        }
        
        h1 { 
            font-size: clamp(32px, 8vw, 50px); 
            margin-bottom: 20px; 
            color: #333; 
            font-weight: 400; 
        }
        
        p { 
            font-size: clamp(16px, 4vw, 20px); 
            color: #666; 
            margin-bottom: 30px; 
            line-height: 1.5;
        }
        
        .waitlist-form { 
            background: #f9f9f9; 
            padding: clamp(20px, 5vw, 30px); 
            border-radius: 8px; 
            margin-top: 40px; 
            border: 1px solid #e0e0e0; 
        }
        
        h3 { 
            margin-bottom: 20px; 
            font-weight: 500; 
            color: #333; 
            font-size: clamp(18px, 4vw, 22px);
        }
        
        input { 
            width: 100%; 
            padding: 12px 15px; 
            margin-bottom: 15px; 
            border: 1px solid #ddd; 
            border-radius: 4px; 
            font-size: 16px; 
            box-sizing: border-box; 
            -webkit-appearance: none;
            appearance: none;
        }
        
        input:focus {
            outline: none;
            border-color: #999;
        }
        
        button { 
            background: #333; 
            color: white; 
            padding: 12px 30px; 
            border: none; 
            border-radius: 4px; 
            font-size: 16px; 
            cursor: pointer; 
            width: 100%; 
            -webkit-appearance: none;
            appearance: none;
            transition: background 0.3s ease;
        }
        
        button:hover { 
            background: #555; 
        }
        
        button:active {
            transform: scale(0.98);
        }
        
        .message { 
            margin-top: 15px; 
            padding: 12px; 
            border-radius: 4px; 
            display: none; 
            font-size: 14px;
        }
        
        .success { 
            background: #d4edda; 
            color: #155724; 
            border: 1px solid #c3e6cb; 
        }
        
        .error { 
            background: #f8d7da; 
            color: #721c24; 
            border: 1px solid #f5c6cb; 
        }
        
        hr { 
            margin: 30px 0 20px; 
            border: none; 
            border-top: 1px solid #e0e0e0; 
        }
        
        /* Tablet styles */
        @media (max-width: 768px) {
            body {
                padding: 15px;
            }
            
            .waitlist-form {
                margin-top: 30px;
            }
        }
        
        /* Mobile styles */
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            
            .container {
                padding: 10px;
            }
            
            .waitlist-form {
                padding: 20px;
                margin-top: 25px;
            }
            
            input, button {
                padding: 10px 12px;
                font-size: 14px;
            }
            
            hr {
                margin: 25px 0 15px;
            }
        }
        
        /* Small mobile */
        @media (max-width: 380px) {
            .waitlist-form {
                padding: 15px;
            }
            
            h3 {
                margin-bottom: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>We'll be back soon!</h1>
        <p>We are currently performing some scheduled maintenance to improve our services.</p>
        <p>— Neoeffectz</p>
        
        <hr>
        
        <div class="waitlist-form">
            <h3>Get notified when we're back</h3>
            <input type="email" id="waitlist_email" placeholder="Enter your email" required>
            <button onclick="submitWaitlist()">Notify Me</button>
            <div id="message" class="message"></div>
        </div>
    </div>

    <script>
        function submitWaitlist() {
            const email = document.getElementById('waitlist_email').value;
            const messageDiv = document.getElementById('message');
            
            if (!email) {
                showMessage('Please enter your email', 'error');
                return;
            }
            
            fetch('/users/waitlist-signup/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify({ email: email })
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    showMessage('Thank you! We\'ll notify you when we\'re back.', 'success');
                    document.getElementById('waitlist_email').value = '';
                } else {
                    showMessage(data.message || 'Something went wrong', 'error');
                }
            })
            .catch(error => {
                showMessage('Network error. Please try again.', 'error');
            });
        }
        
        function showMessage(msg, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = msg;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }
        
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
    </script>
</body>
</html>
