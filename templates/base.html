{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foreign Song Translator</title>
    <link rel="icon" type="image/png" href="{% static 'What does the songs say.png' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">FOREIGN SONG TRANSLATOR</a>
        {% if user.is_authenticated %}
            <a href="{% url 'users:logout' %}" style="color: #b3b3b3; text-decoration: none; font-size: 0.9rem;">Logout</a>
        {% endif %}
    </nav>

    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="alert" style="background: #282828; color: #1DB954; padding: 10px; border-radius: 8px; margin-bottom: 20px; text-align: center;">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </div>
</body>
</html>
